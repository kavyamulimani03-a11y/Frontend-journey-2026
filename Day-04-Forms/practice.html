<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <h1>Student Registration Form</h1>
        <form action="#">

            <label for="Name">Name:</label><br>
            <input type="text" id="text" placeholder="Enter the text"><br>

            <label for="Email">Email:</label><br>
            <input type="email" id="email"><br>

            <label for="password">Password</label><br>
            <input type="password" id="password"><br>

            <label for="Gender">Gender:</label><br>
            <input type="radio" id="gender" name="Male" value="Male">Male<br>

            
            <input type="radio" id="gender" name="Female" value="Female">Female<br>

            
            <input type="radio" id="gender" name="others" value="others">others<br>

            <label for="Skills">Skills:</label><br>
            <input type="checkbox" id="skills" name="skills" value="HTML">HTML<br>

            
            <input type="checkbox" id="skills" name="skills" value="CSS">CSS<br>

            
            <input type="checkbox" id="skills" name="skills" value="JS">JS<br>

            <label for="date of birt">DOB</label><br>
            <input type="date" id="date of birth"><br>

            <label for="Phone NO">Phone No:</label><br>
            <input type="number" id="phone no"><br>

            <label for="Bio">Bio:</label><br>
            <textarea rows="8" cols="55"></textarea><br>

            <button type="button">Submit</button>
            <button type="button">Reset</button>
            </form>
    </body>
</html>
