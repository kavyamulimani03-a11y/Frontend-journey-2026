<!DOCTYPE html>
<html>
    <head>
        <title>Contact Form</title>
    </head>

    <body>

        <h1>Contact Form</h1>
        <form>

            <label>Name:</label>
            <input type="text"><br><br>

            <label>Email:</label>
            <input type="email"><br><br>

            <label>Password:</label>
            <input type="password"><br><br>

            <label>Message:</label>
            <textarea rows="4" cols="30"></textarea><br><br>

            <button type="submit">Submit</button>
            </form>
    </body>
</html>
